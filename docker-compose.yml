services:
  mongo:
    image: mongo:6.0
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DATABASE}
      MONGO_APP_USERNAME: ${MONGO_APP_USERNAME}
      MONGO_APP_PASSWORD: ${MONGO_APP_PASSWORD}
    volumes:
      - mongo_data:/data/db
      - ./docker/mongo/init.js:/docker-entrypoint-initdb.d/init.js:ro
    healthcheck:
      test:
        - CMD-SHELL
        - >
          mongosh --quiet
          -u $$MONGO_INITDB_ROOT_USERNAME
          -p $$MONGO_INITDB_ROOT_PASSWORD
          --authenticationDatabase admin
          --eval "db.adminCommand('ping')"
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - app_network

  backend:
    build:
      context: ./backend
    environment:
      APP_ENV: dev
      MONGODB_URI: mongodb://${MONGO_APP_USERNAME}:${MONGO_APP_PASSWORD}@mongo:27017/?authSource=${MONGO_DATABASE}
      MONGODB_DB: ${MONGO_DATABASE}
      JWT_PASSPHRASE: ${JWT_PASSPHRASE:-changeme_generate_a_real_passphrase}
      CORS_ALLOW_ORIGIN: http://localhost:${FRONTEND_PORT:-3000}
    volumes:
      - ./backend:/var/www/html
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - app_network

  nginx:
    image: nginx:1.25-alpine
    ports:
      - "${NGINX_PORT:-8080}:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./backend/public:/var/www/html/public:ro
    depends_on:
      - backend
    networks:
      - app_network

  frontend:
    build:
      context: ./frontend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:${NGINX_PORT:-8080}
    depends_on:
      - backend
    networks:
      - app_network

networks:
  app_network:
    driver: bridge

volumes:
  mongo_data:
